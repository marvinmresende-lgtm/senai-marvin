<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Endereço</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      margin:0;
      min-height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* VIDEO DE FUNDO */
    #bg-video{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-2;
      pointer-events:none;
    }

    /* ESCURECER O VIDEO */
    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.45);
      z-index:-1;
    }

    /* FORMULARIO */
    .card{
      width:850px;
      max-width:95%;

      background:rgba(0,0,0,0.65);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      border:1px solid rgba(255,255,255,0.15);
      border-radius:20px;

      box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }

    .card-header{
      background:#111 !important;
      border-bottom:1px solid rgba(255,255,255,0.1);
      border-radius:20px 20px 0 0 !important;
    }

    .card-header h3{
      color:white;
      font-size:2rem;
      margin:0;
      font-weight:bold;
    }

    .form-label{
      color:white;
      font-weight:600;
    }

    .form-control,
    .form-select{
      height:50px;
      border-radius:10px;
      border:none;
    }

    .btn-primary{
      background:#222;
      border:none;
      height:50px;
      font-weight:bold;
    }

    .btn-primary:hover{
      background:#333;
    }

    .btn-success{
      height:55px;
      font-size:18px;
      border-radius:10px;
    }

  </style>
</head>

<body>

  <!-- VIDEO DE FUNDO -->
  <iframe
    id="bg-video"
    src="https://www.youtube.com/embed/mPFakMSvysM?autoplay=1&mute=1&loop=1&playlist=mPFakMSvysM&controls=0"
    frameborder="0"
    allow="autoplay; fullscreen">
  </iframe>

  <div class="overlay"></div>

  <!-- FORMULARIO -->
  <div class="card">

    <div class="card-header">
      <h3>Cadastro de Endereço</h3>
    </div>

    <div class="card-body">

      <form>

        <!-- CEP -->
        <div class="row mb-3 align-items-end">

          <div class="col-md-7">
            <label class="form-label">CEP</label>

            <input
              type="text"
              id="cep"
              class="form-control"
              placeholder="Digite o CEP">
          </div>

          <div class="col-md-5">

            <button
              type="button"
              class="btn btn-primary w-100"
              onclick="buscarCEP()">

              Buscar CEP

            </button>

          </div>

        </div>

        <!-- NOME -->
        <div class="mb-3">

          <label class="form-label">
            Nome Completo
          </label>

          <input
            type="text"
            class="form-control"
            placeholder="Digite seu nome">

        </div>

        <!-- RUA -->
        <div class="mb-3">

          <label class="form-label">
            Rua
          </label>

          <input
            type="text"
            id="rua"
            class="form-control">

        </div>

        <!-- BAIRRO CIDADE ESTADO -->
        <div class="row mb-3">

          <div class="col-md-4">

            <label class="form-label">
              Bairro
            </label>

            <input
              type="text"
              id="bairro"
              class="form-control">

          </div>

          <div class="col-md-4">

            <label class="form-label">
              Cidade
            </label>

            <input
              type="text"
              id="cidade"
              class="form-control">

          </div>

          <div class="col-md-4">

            <label class="form-label">
              Estado
            </label>

            <select
              id="estado"
              class="form-select">

              <option value="">
                Selecione
              </option>

              <option>RJ</option>
              <option>SP</option>
              <option>MG</option>
              <option>ES</option>

            </select>

          </div>

        </div>

        <!-- NUMERO -->
        <div class="mb-3">

          <label class="form-label">
            Número
          </label>

          <input
            type="number"
            class="form-control">

        </div>

        <!-- BOTAO -->
        <button
          type="submit"
          class="btn btn-success w-100">

          Cadastrar

        </button>

      </form>

    </div>

  </div>

  <!-- BUSCA CEP -->
  <script>

    function buscarCEP(){

      let cep = document
      .getElementById("cep")
      .value
      .replace(/\D/g, "");

      fetch(`https://viacep.com.br/ws/${cep}/json/`)
      .then(resposta => resposta.json())
      .then(dados => {

        document.getElementById("rua").value = dados.logradouro;
        document.getElementById("bairro").value = dados.bairro;
        document.getElementById("cidade").value = dados.localidade;
        document.getElementById("estado").value = dados.uf;

      });

    }

  </script>

</body>
</html>
