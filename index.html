<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h3>Cadastro de Endereço</h3>
      </div>

      <div class="card-body">
        <form>
          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">CEP</label>
              <input type="text" id="cep" class="form-control" placeholder="Digite o CEP">
            </div>

            <div class="col-md-2 d-flex align-items-end">
              <button type="button" class="btn btn-primary w-100" onclick="buscarCEP()">
                Buscar
              </button>
            </div>

            <div class="col-md-6">
              <label class="form-label">Nome completo</label>
              <input type="text" class="form-control" placeholder="Digite seu nome">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Rua</label>
            <input type="text" id="rua" class="form-control">
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">Bairro</label>
              <input type="text" id="bairro" class="form-control">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cidade</label>
              <input type="text" id="cidade" class="form-control">
            </div>

            <div class="col-md-4">
              <label class="form-label">Estado</label>
              <select id="estado" class="form-select">
                <option value="">Selecione</option>
                <option>RJ</option>
                <option>SP</option>
                <option>MG</option>
                <option>ES</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-3">
              <label class="form-label">Número</label>
              <input type="number" class="form-control">
            </div>

            <div class="col-md-9">
              <label class="form-label">Complemento</label>
              <input type="text" class="form-control" placeholder="Casa, apartamento, bloco...">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Tipo de residência</label>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="tipo" id="casa">
              <label class="form-check-label" for="casa">Casa</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="tipo" id="apartamento">
              <label class="form-check-label" for="apartamento">Apartamento</label>
            </div>
          </div>
